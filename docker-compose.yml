
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dev_monks
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:password@db:5432/dev_monks?sslmode=disable"
      INNGEST_BASE_URL: http://inngest:8288
      INNGEST_DEV: 1
      INNGEST_EVENT_KEY: "local"
      NODE_ENV: production
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-sk-placeholder}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  inngest:
    image: inngest/inngest:latest
    ports:
      - "8288:8288"
    environment:
      INNGEST_LOG_LEVEL: info
    command: >
      inngest dev -u http://app:3000/api/inngest --port 8288 --host 0.0.0.0 --no-discovery
    depends_on:
      - app

volumes:
  postgres_data:
